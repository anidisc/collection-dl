# Path to the Python interpreter used by the 'dl' wrapper.
# Leave empty to use the default python3 found in PATH.
# Example: python=/home/user/project/.venv/bin/python3
python=

# Absolute path to the directory containing the scripts.
# Required when 'dl' is invoked via PATH and cannot locate itself.
# Leave empty to auto-detect from the wrapper's own location.
# Example: scripts_dir=/home/user/collection-dl
scripts_dir=
